name: release_snap

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Release after build'
        required: true
        default: 'no'
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  BUILD_PYTHON_VERSION: "3.10"
  BUILD_POETRY_VERSION: "2.2.1"

jobs:
  build_snap:
    needs: build_python
    runs-on: ubuntu-latest
    env:
      POETRY_VIRTUALENVS_CREATE: false
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v3

      - name: Set up Python ${{ env.BUILD_PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.BUILD_PYTHON_VERSION }}

      - name: Set up Poetry ${{ env.BUILD_POETRY_VERSION }}
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: ${{ env.BUILD_POETRY_VERSION }}

      - name: Install requirements
        run: |
          sudo apt-get install -y desktop-file-utils appstream-util

      - name: Prepare
        run: |
          just build-linux-snap-no-build

      - uses: snapcore/action-build@v1
        id: build
        with:
          path: build/snap

      - name: Save snapped app
        uses: actions/upload-artifact@v4
        with:
          name: snap_result
          path: ${{ steps.build.outputs.snap }}

      - uses: snapcore/action-publish@v1
        if: github.event_name == 'push' || github.event.inputs.release == 'yes'
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.STORE_LOGIN }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: edge
